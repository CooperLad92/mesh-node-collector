<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Mesh Node Collector</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

body{
font-family:Arial;
background:#f4f7fb;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
border:none;
background:#2f80ed;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1366d6;
}

#map{
height:400px;
margin-top:30px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Mesh Node Collector</h1>
<p>Discover mesh nodes like Pokémon cards.</p>

<h2>Score: <span id="score">0</span></h2>

<div id="nodes"></div>

<h2>Your Collection</h2>
<div id="collection"></div>

<h2>Mesh Map</h2>
<div id="map"></div>

<script>

const nodes=[

{
name:"Hilltop Relay",
rarity:"Rare",
points:50,
hardware:"Heltec V3",
antenna:"5dBi",
owner:"MeshKildare",
lat:53.35,
lng:-6.26
},

{
name:"Town Link",
rarity:"Common",
points:10,
hardware:"T-Beam",
antenna:"3dBi",
owner:"NaasNode",
lat:53.22,
lng:-6.66
},

{
name:"River Watch",
rarity:"Epic",
points:100,
hardware:"RAK WisBlock",
antenna:"8dBi",
owner:"RiverMesh",
lat:53.19,
lng:-6.12
},

{
name:"Workshop Beacon",
rarity:"Uncommon",
points:25,
hardware:"T-Echo",
antenna:"2dBi",
owner:"MakerLab",
lat:53.40,
lng:-6.30
},

{
name:"Cafe Mesh",
rarity:"Legendary",
points:300,
hardware:"Station G2",
antenna:"10dBi",
owner:"CafeHost",
lat:53.34,
lng:-6.24
}

]

let collection=JSON.parse(localStorage.getItem("meshCollection"))||[]

let score=localStorage.getItem("meshScore")||0

document.getElementById("score").innerText=score

function render(){

let nodesHTML=""

nodes.forEach((node,i)=>{

nodesHTML+=`

<div class="card">

<h3>${node.name}</h3>

<p>${node.rarity}</p>

<p>${node.hardware}</p>

<button onclick="collect(${i})">Collect</button>

</div>

`

})

document.getElementById("nodes").innerHTML=nodesHTML


let colHTML=""

collection.forEach(node=>{

colHTML+=`<div class="card">

<h3>${node.name}</h3>

<p>${node.rarity}</p>

</div>`

})

document.getElementById("collection").innerHTML=colHTML

}

function collect(i){

collection.push(nodes[i])

score=parseInt(score)+nodes[i].points

localStorage.setItem("meshCollection",JSON.stringify(collection))

localStorage.setItem("meshScore",score)

document.getElementById("score").innerText=score

render()

}

render()


const map=L.map('map').setView([53.34,-6.26],8)

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
maxZoom:19
}
).addTo(map)


nodes.forEach(node=>{

L.marker([node.lat,node.lng])
.addTo(map)
.bindPopup(

"<b>"+node.name+"</b><br>"+
"Rarity: "+node.rarity+"<br>"+
"Hardware: "+node.hardware+"<br>"+
"Antenna: "+node.antenna+"<br>"+
"Owner: "+node.owner

)

})

</script>

</body>
</html>
