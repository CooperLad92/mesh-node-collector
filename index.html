<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mesh Node Collector</title>
<style>
body{
font-family:Arial;
background:#f4f7fb;
text-align:center;
padding:40px;
}

.card{
background:white;
padding:20px;
margin:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
padding:10px 15px;
border:none;
background:#2f80ed;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1366d6;
}
</style>
</head>

<body>

<h1>Mesh Node Collector</h1>
<p>Discover mesh nodes like Pokémon cards.</p>

<div id="nodes"></div>

<h2>Your Collection</h2>
<div id="collection"></div>

<script>

const nodes=[
{name:"Hilltop Relay",rarity:"Rare"},
{name:"Town Link",rarity:"Common"},
{name:"River Watch",rarity:"Epic"},
{name:"Workshop Beacon",rarity:"Uncommon"},
{name:"Cafe Mesh",rarity:"Legendary"}
]

let collection=JSON.parse(localStorage.getItem("meshCollection"))||[]

function render(){

let nodesHTML=""

nodes.forEach((node,i)=>{
nodesHTML+=`
<div class="card">
<h3>${node.name}</h3>
<p>${node.rarity}</p>
<button onclick="collect(${i})">Collect</button>
</div>`
})

document.getElementById("nodes").innerHTML=nodesHTML

let colHTML=""

collection.forEach(node=>{
colHTML+=`<div class="card">${node.name}</div>`
})

document.getElementById("collection").innerHTML=colHTML
}

function collect(i){
collection.push(nodes[i])
localStorage.setItem("meshCollection",JSON.stringify(collection))
render()
}

render()

</script>

</body>
</html>
